<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trackr — Save job</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; color: #444; }
    input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15); }
    input:read-only { background: #f8fafc; color: #475569; cursor: default; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-text { background: none; color: #2563eb; padding: 4px 8px; }
    .btn-text:hover { text-decoration: underline; }
    .card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .card.highlight { background: #eff6ff; border-color: #bfdbfe; }
    .banner {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .banner.info { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .banner.success { background: #dcfce7; color: #166534; }
    .message { margin-top: 10px; padding: 8px 10px; border-radius: 6px; font-size: 12px; }
    .message.success { background: #dcfce7; color: #166534; }
    .message.error { background: #fee2e2; color: #991b1b; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .signed-in-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: #dcfce7; color: #166534;
      border-radius: 6px; margin-bottom: 12px; font-size: 12px;
    }
    .section { margin-bottom: 14px; }
    .section-header { font-weight: 600; font-size: 13px; margin-bottom: 8px; }
    #signInSection.hidden, #signedInBar.hidden, #saveSection.hidden { display: none !important; }
    #loadingState { text-align: center; padding: 20px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div id="loadingState">Checking sign-in…</div>

  <div id="mainContent" class="hidden">
    <h1>Trackr</h1>
    <p class="subtitle">Save jobs from any tab to your dashboard.</p>

    <!-- Sign-in card: shown when signed out -->
    <section id="signInSection" class="section card highlight" aria-label="Sign in to Trackr">
      <div class="section-header">Sign in to Trackr</div>
      <p style="margin: 0 0 10px; font-size: 12px; color: #475569;">
        Open Trackr in your browser, sign in, then generate an API key and paste it below.
      </p>
      <a href="#" id="openTrackrGetKeyLink" target="_blank" rel="noopener" style="font-size: 12px;">Open Trackr to get your API key →</a>
      <label for="trackrUrl" style="margin-top: 10px;">Trackr URL</label>
      <input type="text" id="trackrUrl" placeholder="http://localhost:3000" />
      <label for="apiKey">API key</label>
      <input type="password" id="apiKey" placeholder="Paste your API key from the dashboard" autocomplete="off" />
      <div class="row">
        <button type="button" id="signInBtn" class="btn-primary">Sign in</button>
      </div>
    </section>

    <!-- Signed-in bar: shown when signed in -->
    <div id="signedInBar" class="signed-in-bar hidden">
      <span>Signed in to Trackr</span>
      <button type="button" id="signOutBtn" class="btn-text">Sign out</button>
    </div>

    <!-- Save job form -->
    <section id="saveSection" class="section" aria-label="Save this job">
      <div id="signInPrompt" class="banner info hidden">
        Sign in above to save jobs to your Trackr dashboard.
      </div>
      <label for="jobUrl">Job URL</label>
      <input type="url" id="jobUrl" placeholder="From current tab" readonly />
      <label for="jobTitle">Job title</label>
      <input type="text" id="jobTitle" placeholder="e.g. Senior Engineer" />
      <label for="companyName">Company</label>
      <input type="text" id="companyName" placeholder="e.g. Acme Inc" />
      <div class="row">
        <button type="button" id="saveJobBtn" class="btn-primary">Save to Trackr</button>
      </div>
      <p style="margin: 10px 0 0; font-size: 12px;">
        <a href="#" id="openTrackrLink" target="_blank" rel="noopener">Open Trackr</a>
      </p>
    </section>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
