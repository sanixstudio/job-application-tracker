<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trackr — Save job</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 12px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }
    label { display: block; margin-bottom: 4px; font-weight: 500; color: #444; }
    input, textarea {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
    input:read-only, textarea:read-only { background: #f5f5f5; color: #555; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .message {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    .message.success { background: #dcfce7; color: #166534; }
    .message.error { background: #fee2e2; color: #991b1b; }
    .key-status { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .key-status.saved { color: #16a34a; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Save to Trackr</h1>

  <div id="keySection">
    <div id="keyStatus" class="key-status">No API key saved. Paste your key from the Trackr dashboard.</div>
    <label for="trackrUrl">Trackr URL</label>
    <input type="text" id="trackrUrl" placeholder="http://localhost:3000" />
    <label for="apiKey">API key</label>
    <input type="password" id="apiKey" placeholder="Paste key from Dashboard → Save from browser" />
    <div class="row">
      <button type="button" id="saveKeyBtn" class="btn-primary">Save key</button>
      <button type="button" id="clearKeyBtn" class="btn-secondary">Clear</button>
    </div>
  </div>

  <hr style="margin: 12px 0; border: none; border-top: 1px solid #e2e8f0;" />

  <label for="jobUrl">Job URL</label>
  <input type="url" id="jobUrl" placeholder="From current tab" readOnly />
  <label for="jobTitle">Job title</label>
  <input type="text" id="jobTitle" placeholder="e.g. Senior Engineer" />
  <label for="companyName">Company</label>
  <input type="text" id="companyName" placeholder="e.g. Acme Inc" />

  <div class="row">
    <button type="button" id="saveJobBtn" class="btn-primary">Save to Trackr</button>
  </div>
  <p style="margin: 10px 0 0; font-size: 12px;">
    <a href="#" id="openTrackrLink" target="_blank" rel="noopener">Open Trackr</a>
  </p>

  <div id="message" class="message" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
